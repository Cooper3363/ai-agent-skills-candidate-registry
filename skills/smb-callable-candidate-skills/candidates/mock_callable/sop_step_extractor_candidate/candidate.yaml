candidate_id: "sop_step_extractor_candidate"
status: "mock_callable"
business_package: "admin_operations"
roles:
  - "admin_operator"
  - "operations_operator"
scenario: "SOP 步骤提取"
source_project: "internal_template"
license_or_origin: "internal_template; no third-party code reused"
trial_mode:
  - "mock_only"
  - "read_only"
  - "external_action_blocked"
deepagents_trial_fit: "mock_only"
deepagents_smoke_status: "passed"
input_schema:
  input_text: "string; Chinese mock/read-only input"
  business_context: "object; optional mock policy, metrics, order, resume, or campaign context"
  constraints: "array; optional permission and policy constraints"
output_schema:
  fields:
    - "steps"
    - "missing_steps"
    - "owner_roles"
    - "quality_warnings"
