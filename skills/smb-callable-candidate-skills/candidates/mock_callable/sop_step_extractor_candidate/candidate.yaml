  - "写 CRM/日历/任务/业务系统"
  - "抓取真实网页"
  - "上传文件"
  - "退款或赔偿"
  - "修改库存"
  - "生成真实图片/视频/音频/OCR/PDF 结果"
human_review_triggers:
  - "safety_step_missing"
  - "unclear_permission"
count_towards_100: true
customer_callable: false
platform_deliverable: false
not_l2_passed: true
formal_l2_status: "not_l2_passed_or_component"
next_step: "candidate_pool_continue_smoke"
notes: "Candidate library controlled trial only. Stable customer-callable baseline remains 13 skills."
