    - "应收逾期：大客户逾期 45 天，应标收款风险，失败判定为直接催收结论。"
    - "数据缺口：缺应付数据，应标不能判断，失败判定为过度判断。"
platform_handoff_notes:
  - "draft_l3 候选包，可送平台候选调用验收窗口复验。"
