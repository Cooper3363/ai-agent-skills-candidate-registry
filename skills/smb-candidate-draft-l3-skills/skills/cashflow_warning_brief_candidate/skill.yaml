  - "付款风险"
  - "数据缺口"
  - "大额应收逾期"
  - "税务/审计相关"
  - "低置信度"
failure_modes:
  - "给融资建议"
  - "输出财务建议"
  - "无人工复核"
  - "过度确定"
  - "忽略数据缺口"
