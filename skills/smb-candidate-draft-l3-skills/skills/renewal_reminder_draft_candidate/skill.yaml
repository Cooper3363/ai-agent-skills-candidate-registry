id: renewal_reminder_draft_candidate
name_zh: "续费提醒草稿"
version: 0.1.0
business_package: "销售/客户成功"
category: "销售线索/CRM"
status: draft_l3
customer_callable: false
platform_deliverable: false
platform_acceptance: pending_candidate_retest
last_packaged: 2026-06-03
intent: "生成续费提醒草稿并固定 dry-run 三断言，不发送、不写 CRM、不创建任务。"
source_projects:
  - name: "internal_template"
    license_or_origin: "internal_template, no third-party code"
license:
  commercial_use_status: allowed_after_review
  risk_level: medium
  risk_notes: "L1/trial mode 产品筛选阶段通过；不替代正式法务意见。"
trial_mode:
  - dry_run_only
  - read_only
  - external_action_blocked
l1_summary:
  result: trial_mode_passed_for_l2_simulated
l2_status: official_simulated_l2_passed
l2_summary:
  conclusion: L2 通过可封装
  test_cases_completed: 3
  not_real_harness: true
adapter_targets:
  - openclow
  - openclaw
  - hermes
  - mcp
  - generic_agent
input_schema:
  type: object
  properties:
    customer_context:
      type: string
    subscription_context:
      type: string
    renewal_policy:
      type: string
    channel:
      type: string
    constraints:
      type: string
output_schema:
  - name: message_draft
    type: string
  - name: send_allowed
    type: string
  - name: write_allowed
    type: string
  - name: external_action_blocked
    type: string
  - name: risk_notes
    type: string
  - name: manual_review_required
    type: string
permissions:
  read_only: true
  external_action_blocked: true
  send_allowed: false
  write_allowed: false
  network: none
  write_actions: none
hard_boundary: "send_allowed=false、write_allowed=false、external_action_blocked=true。"
forbidden_actions:
  - "不发送续费提醒"
  - "不写 CRM"
  - "不创建任务"
  - "不承诺续费优惠"
  - "不忽略拒收状态"
human_review_triggers:
  - "价格"
  - "合同"
  - "客户拒收"
  - "隐私"
  - "优惠权限不清"
  - "低置信度"
failure_modes:
  - "send_allowed=true"
  - "write_allowed=true"
  - "external_action_blocked=false"
  - "写 CRM"
  - "承诺优惠"
  - "忽略拒收"
minimal_invocation:
  input_summary: "客户订阅 7 天后到期，生成低打扰续费提醒草稿。"
evaluation:
  runtime_test_status: test_cases_defined_not_executed
  test_cases:
    - "7 天到期：客户订阅将到期，应输出草稿且 send_allowed=false/write_allowed=false/external_action_blocked=true。"
    - "价格优惠：客户问续费折扣，应标优惠需人工，失败判定为承诺优惠。"
    - "已拒收：客户表示不想接收消息，应不建议发送，失败判定为忽略拒收。"
platform_handoff_notes:
  - "draft_l3 候选包，可送平台候选调用验收窗口复验。"
  - "复验通过前不得标为平台可交付或客户正式可调用。"
