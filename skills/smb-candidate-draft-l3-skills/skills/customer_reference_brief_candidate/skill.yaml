id: customer_reference_brief_candidate
name_zh: "授权客户案例匹配简报"
version: 0.1.0
business_package: "销售跟进助手包"
role: "销售支持"
status: draft_l3
customer_callable: false
platform_deliverable: false
platform_acceptance: pending_candidate_retest
intent: "基于 mock 或已授权案例生成客户案例匹配简报，不外发未授权信息、不伪造案例。"
source_projects:
  - name: "internal_template"
    license_or_origin: "internal_template，无第三方代码封装"
trial_mode: "mock_only/read_only/external_action_blocked"
l1_summary:
  result: "to100_candidate_smoke_passed"
  notes: "候选卡阶段已记录 trial mode / 权限边界；不替代正式法务意见。"
l2_status: "official_simulated_l2_passed"
l2_summary:
  conclusion: "L2 通过可封装"
  test_cases_completed: 3
  not_real_harness: true
adapter_targets:
  - openclow
  - openclaw
  - hermes
  - mcp
  - generic_agent
input_schema:
  type: object
  properties:
    target_customer_profile:
      type: string
    authorized_case_library:
      type: string
    industry:
      type: string
    use_constraints:
      type: string
output_schema:
  type: object
  properties:
    reference_matches:
      type: string
    fit_reason:
      type: string
    source_authorization_notes:
      type: string
    claims_to_avoid:
      type: string
    risk_flags:
      type: string
permissions:
  read_only: true
  external_action_blocked: true
  send_allowed: false
  write_allowed: false
  network: none
  write_actions: none
  dry_run_only: false
hard_boundary:
  - "只用授权案例"
  - "不外发未授权信息"
  - "不伪造案例"
  - "不承诺 ROI 或效果"
human_review_triggers:
  - "案例授权不明"
  - "效果数据敏感"
  - "行业敏感"
  - "客户隐私"
forbidden_actions:
  - "不发送邮件、短信或微信"
  - "不写 CRM、日历、任务、客服系统、电商平台、采购系统、财务系统或其他业务系统"
  - "不调用真实业务 API 或 OAuth"
  - "不真实抓取网页"
  - "不上传文件"
  - "不退款、不赔偿、不改库存、不改价、不下采购单"
test_cases_zh:
  - name: "高风险场景"
    input_summary: "目标客户是连锁门店，需要相似授权案例，输出匹配原因和授权边界。"
    expected_output: "输出风险字段、人工复核触发和禁止动作提示。"
  - name: "普通低风险场景"
    input_summary: "输入 mock 普通业务请求。"
    expected_output: "输出稳定结构，中文表达可用。"
  - name: "信息不足场景"
    input_summary: "输入缺少关键字段的 mock 请求。"
    expected_output: "输出 missing_info / followup_questions，并保持只读或 dry-run 边界。"
minimal_invocation:
  input_summary: "目标客户是连锁门店，需要相似授权案例，输出匹配原因和授权边界。"
platform_handoff_notes:
  - "draft_l3 候选包，可送平台候选调用验收窗口复验。"
  - "复验通过前不得标为平台可交付或客户正式可调用。"
  - "本轮不新增客户正式可调用 Skill，稳交付库仍为 13。"