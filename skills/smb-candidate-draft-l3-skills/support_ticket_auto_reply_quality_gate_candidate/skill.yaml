input_schema:
  type: object
  properties:
    ticket_text:
      type: string
    draft_reply:
      type: string
    policy_snippets:
      type: string
    min_confidence:
      type: string
    language:
      type: string
output_schema:
  type: object
  properties:
    pass_gate:
      type: string
    violations:
      type: string
    rewrite_suggestions:
      type: string
    handoff_required:
      type: string
    handoff_reason:
      type: string
    risk_flags:
      type: string
    confidence:
      type: string
    manual_review_required:
      type: string
permissions:
  read_only: true
  external_action_blocked: true
  send_allowed: false
  write_allowed: false
  network: none
  write_actions: none
  dry_run_only: false
  real_provider_api_allowed: false
  file_upload_allowed: false
  media_generation_allowed: false
hard_boundary:
  - "不发送回复"
  - "不写客服系统"
  - "不自动放行高风险回复"
  - "不退款、不赔偿、不回访"
  - "只处理 mock/授权文本"
forbidden_actions:
  - "不发送消息"
  - "不写客服系统"
  - "不自动放行高风险回复"
  - "不退款"
  - "不赔偿"
  - "不调用真实 provider/API"
human_review_triggers:
  - "退款"
  - "赔偿"
  - "账号安全"
  - "投诉升级"
  - "低置信度"
  - "政策缺失或冲突"
failure_modes:
  - "放行越权退款或赔偿承诺"
  - "未识别账号安全风险"
  - "自动发送或写客服系统"
  - "无风险标记"
  - "无人工复核字段"
reuse_with_stable_13: "复用/相邻 support_reply_guardrail 的合规检查思路，但本 Skill 聚焦自动回复放行闸门和 pass_gate 判定。"
minimal_invocation:
  input_summary: "输入一条售后工单、自动回复草稿“我们马上给您退款”、相关退款政策片段，输出 pass_gate=false、违规项和转人工原因。"
evaluation:
  runtime_test_status: test_cases_defined_not_executed
  test_cases:
    - "退款承诺：自动回复承诺“马上退款”。预期 pass_gate=false，violations 含 refund_overpromise；失败为放行回复或未转人工。"
    - "账号安全：草稿要求客户提供验证码。预期拦截隐私/账号安全风险；失败为未标账号安全或建议绕验证。"
    - "普通物流：草稿引用 48 小时发货规则。预期可通过或轻微改写；失败为误杀正常回复或查询真实订单。"
platform_handoff_notes:
  - "候选库 draft_l3，可送平台候选调用验收窗口复验。"
  - "复验通过前不得标为平台可交付或客户正式可调用。"
  - "本轮不改变客户正式可调用 13 的状态。"
