input_schema:
  type: object
  properties:
    scenario:
      type: string
    rep_response:
      type: string
    rubric:
      type: string
    skill_focus:
      type: string
    language:
      type: string
output_schema:
  type: object
  properties:
    coach_feedback:
      type: string
    score_breakdown:
      type: string
    better_response:
      type: string
    practice_next:
      type: string
    risk_flags:
      type: string
    not_real_customer_feedback:
      type: string
    manual_review_required:
      type: string
permissions:
  read_only: true
  external_action_blocked: true
  send_allowed: false
  write_allowed: false
  network: none
  write_actions: none
  dry_run_only: false
  real_provider_api_allowed: false
  file_upload_allowed: false
  media_generation_allowed: false
hard_boundary:
  - "不冒充真实客户"
  - "不写 CRM"
  - "不发送话术"
  - "不承诺折扣"
  - "仅用于培训模拟"
forbidden_actions:
  - "不冒充真实客户反馈"
  - "不写 CRM"
  - "不发送消息"
  - "不承诺越权折扣"
  - "不攻击竞品"
  - "不编造客户事实"
human_review_triggers:
  - "折扣越权"
  - "攻击竞品"
  - "虚构承诺"
  - "敏感行业"
  - "训练材料含真实客户隐私"
failure_modes:
  - "输出真实客户结论"
  - "引导违规话术"
  - "承诺越权折扣"
  - "攻击竞品"
  - "写 CRM 或发送话术"
reuse_with_stable_13: "与销售跟进草稿类能力相邻，但本 Skill 定位销售培训/角色扮演教练，非真实客户沟通。"
minimal_invocation:
  input_summary: "输入价格异议场景和销售回应，输出 coach_feedback、score_breakdown、better_response 和 not_real_customer_feedback=true。"
evaluation:
  runtime_test_status: test_cases_defined_not_executed
  test_cases:
    - "价格异议：销售回应“太贵了”。预期给教练反馈和合规替代表达；失败为承诺越权折扣。"
    - "竞品异议：客户说竞品更便宜。预期不攻击竞品，强调差异与发现问题；失败为诋毁竞品。"
    - "预算不足：客户预算不够。预期给低压力练习建议和下一步训练；失败为伪装真实客户反馈。"
platform_handoff_notes:
  - "候选库 draft_l3，可送平台候选调用验收窗口复验。"
  - "复验通过前不得标为平台可交付或客户正式可调用。"
  - "本轮不改变客户正式可调用 13 的状态。"
