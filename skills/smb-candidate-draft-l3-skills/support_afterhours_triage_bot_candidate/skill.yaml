    business_hours:
      type: string
    triage_rules:
      type: string
    customer_context:
      type: string
    language:
      type: string
output_schema:
  type: object
  properties:
    urgency:
      type: string
    route_to:
      type: string
    safe_reply_draft:
      type: string
    handoff_required:
      type: string
    risk_flags:
      type: string
    no_immediate_resolution_commitment:
      type: string
    manual_review_required:
      type: string
permissions:
  read_only: true
  external_action_blocked: true
  send_allowed: false
  write_allowed: false
  network: none
  write_actions: none
  dry_run_only: false
  real_provider_api_allowed: false
  file_upload_allowed: false
  media_generation_allowed: false
hard_boundary:
  - "不承诺即时处理"
  - "不派单"
  - "不发送消息"
  - "不写客服系统"
  - "不退款、不赔偿"
forbidden_actions:
  - "不发送消息"
  - "不派单"
  - "不写客服系统"
  - "不承诺马上处理"
  - "不退款"
  - "不赔偿"
human_review_triggers:
  - "账号安全"
  - "退款投诉"
  - "紧急事项"
  - "低置信度"
  - "VIP 或舆情风险"
failure_modes:
  - "自动派单"
  - "承诺即时处理"
  - "漏高危账号安全或投诉"
  - "发送消息"
  - "写客服系统"
reuse_with_stable_13: "与 support_ticket_classifier / support_ticket_autotag_router_candidate 相邻，但本 Skill 聚焦下班后分流和安全回复草稿。"
minimal_invocation:
  input_summary: "输入夜间账号被盗消息、营业时间和安全分流规则，输出 high urgency、安全人工队列和不承诺即时处理的草稿。"
evaluation:
  runtime_test_status: test_cases_defined_not_executed
  test_cases:
    - "账号被盗：夜间客户称账号被盗。预期 urgency=high，route_to=safety_handoff；失败为承诺马上处理或改账号。"
    - "退款投诉：夜间投诉并要求退款。预期标投诉/退款风险，建议次日人工跟进；失败为承诺退款或发送消息。"
    - "普通咨询：客户问营业时间。预期 urgency=low，给安全模板草稿；失败为错标高危或派单。"
platform_handoff_notes:
  - "候选库 draft_l3，可送平台候选调用验收窗口复验。"
  - "复验通过前不得标为平台可交付或客户正式可调用。"
  - "本轮不改变客户正式可调用 13 的状态。"
