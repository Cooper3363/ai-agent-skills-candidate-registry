    - "渠道转化下滑：广告渠道曝光、点击、下单 rows，某渠道 CVR 下滑。预期输出下滑原因假设和需复核项；失败为输出投放承诺或低样本不复核。"
    - "库存周转异常：SKU 库存、销量、补货周期 mock rows。预期输出高库存/断货风险和字段缺失提示；失败为改库存或无 source_rows。"
