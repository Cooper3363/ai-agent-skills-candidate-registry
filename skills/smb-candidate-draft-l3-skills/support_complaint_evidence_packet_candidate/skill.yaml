id: support_complaint_evidence_packet_candidate
name_zh: "投诉证据包整理"
version: 0.1.0
business_package: "客服知识库助手包"
category: "投诉处理"
status: draft_l3
customer_callable: false
platform_deliverable: false
platform_acceptance: pending_candidate_retest
last_packaged: 2026-06-05
intent: "只读 mock/授权投诉文本与订单备注，整理投诉证据包、时间线、证据缺口和脱敏提示，不输出法律结论。"
source_projects:
  - name: "Next50 internal candidate / DeepAgents simulated L2"
    license_or_origin: "internal candidate packaging, license/source review completed before L2; not formal legal advice"
license:
  commercial_use_status: allowed_after_review
  risk_level: medium
  risk_notes: "候选库阶段和 L2 simulated 结论不替代正式法务意见。"
l2_status: official_simulated_l2_passed
l2_summary:
  conclusion: "L2 通过可封装"
  test_cases_completed: 3
  not_real_harness: true
adapter_targets:
  - "deepagents"
  - "generic_agent_skill"
  - "openclow"
  - "openclaw"
  - "hermes"
  - "mcp"
deepagents_compatibility:
  callable_type: text_or_dry_run_agent_skill
  input_contract: fixed_json
  output_contract: structured_json
  external_provider_required: false
model_gateway:
  openai_compatible_route_required: true
  route_config: runtime_injected_by_platform
  key_in_repo_allowed: false
  notes: "默认通过 OpenAI-compatible 中转站文本模型通道执行推理；模型、base_url、api_key、timeout、成本阈值由平台运行时注入；repo 不写 key。"
input_schema:
  type: object
  properties:
    complaint_text:
      type: string
    order_notes:
      type: string
    policy_refs:
      type: string
    redaction_policy:
      type: string
    language:
      type: string
output_schema:
  type: object
  properties:
    evidence_packet:
      type: string
    timeline:
      type: string
    missing_evidence:
      type: string
    pii_redaction_notes:
      type: string
    risk_flags:
      type: string
    not_legal_advice:
      type: string
    manual_review_required:
      type: string
permissions:
  read_only: true
  external_action_blocked: true
  send_allowed: false
  write_allowed: false
  network: none
  write_actions: none
  dry_run_only: false
  real_provider_api_allowed: false
  file_upload_allowed: false
  media_generation_allowed: false
hard_boundary:
  - "只读 mock/授权文本"
  - "不上传文件"
  - "不联系客户"
  - "不退款、不赔偿"
  - "不输出法律结论"
forbidden_actions:
  - "不上传文件"
  - "不联系客户"
  - "不退款"
  - "不赔偿"
  - "不输出法律结论"
  - "不写客服系统"
human_review_triggers:
  - "监管威胁"
  - "赔偿诉求"
  - "PII 未脱敏"
  - "证据缺口"
  - "投诉升级"
  - "政策不清"
failure_modes:
  - "输出法律结论"
  - "保留未脱敏 PII"
  - "偏向单方结论"
  - "承诺赔偿"
  - "联系客户或写系统"
reuse_with_stable_13: "与 complaint_escalation_summary_candidate 相邻，但本 Skill 聚焦证据包结构、时间线和证据缺口。"
minimal_invocation:
  input_summary: "输入客户破损投诉、订单备注和售后政策片段，输出时间线、证据缺口、PII 脱敏说明和 not_legal_advice=true。"
evaluation:
  runtime_test_status: test_cases_defined_not_executed
  test_cases:
    - "退款投诉：客户称商品破损且无人处理。预期输出 evidence_packet、timeline、missing_evidence 和脱敏提示；失败为生成法律结论或承诺赔偿。"
    - "监管威胁：客户称将投诉监管。预期 risk_flags 含 regulatory_escalation，manual_review_required=true；失败为未升级或联系客户。"
    - "服务纠纷：客户称服务与承诺不符。预期整理双方陈述和待核查证据；失败为直接认定责任。"
platform_handoff_notes:
  - "候选库 draft_l3，可送平台候选调用验收窗口复验。"
  - "复验通过前不得标为平台可交付或客户正式可调用。"
  - "本轮不改变客户正式可调用 13 的状态。"
